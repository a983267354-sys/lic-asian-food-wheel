<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>嫣然吃什么转盘</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23ffcf5f'/%3E%3Cpath d='M32 8v24l20-12A28 28 0 0 0 32 8Z' fill='%23ff6b6b'/%3E%3Cpath d='M32 32 12 44a28 28 0 0 0 40 0Z' fill='%2361d3b2'/%3E%3Ccircle cx='32' cy='32' r='9' fill='%23fff8e5'/%3E%3C/svg%3E"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #101112;
        --panel: #181b1f;
        --panel-2: #20242a;
        --line: rgba(255, 255, 255, 0.12);
        --text: #f6f3ee;
        --muted: #aeb5bd;
        --accent: #ffcf5f;
        --accent-2: #61d3b2;
        --danger: #ff6b6b;
        --shadow: 0 20px 70px rgba(0, 0, 0, 0.42);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 15% 0%, rgba(97, 211, 178, 0.18), transparent 28rem),
          radial-gradient(circle at 92% 18%, rgba(255, 207, 95, 0.14), transparent 26rem),
          linear-gradient(135deg, #101112 0%, #161418 46%, #11161a 100%);
        color: var(--text);
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
      }

      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(340px, 440px);
        gap: 28px;
        padding: clamp(16px, 3vw, 36px);
      }

      .stage {
        display: grid;
        grid-template-rows: auto minmax(360px, 1fr) auto;
        gap: 18px;
        min-width: 0;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: grid;
        gap: 4px;
        min-width: 0;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(1.65rem, 3vw, 3.15rem);
        line-height: 0.98;
        letter-spacing: 0;
      }

      .quick-cuisine {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: max-content;
        max-width: 100%;
        color: var(--muted);
        font-size: 0.98rem;
        line-height: 1.35;
      }

      .quick-cuisine span {
        flex: 0 0 auto;
        font-weight: 760;
      }

      .quick-cuisine-select {
        width: 142px;
        max-width: 48vw;
        height: 34px;
        padding: 0 30px 0 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        appearance: none;
        color: var(--text);
        background:
          linear-gradient(45deg, transparent 50%, var(--muted) 50%) calc(100% - 17px) 14px / 6px 6px no-repeat,
          linear-gradient(135deg, var(--muted) 50%, transparent 50%) calc(100% - 11px) 14px / 6px 6px no-repeat,
          rgba(255, 255, 255, 0.07);
        outline: none;
      }

      .quick-cuisine-select:focus {
        border-color: rgba(255, 207, 95, 0.72);
        box-shadow: 0 0 0 3px rgba(255, 207, 95, 0.12);
      }

      .counter {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 92px;
        height: 42px;
        padding: 0 14px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        white-space: nowrap;
      }

      .wheel-zone {
        position: relative;
        display: grid;
        place-items: center;
        min-height: min(72vh, 720px);
      }

      .wheel-shell {
        position: relative;
        width: min(78vh, 72vw, 760px);
        max-width: 100%;
        aspect-ratio: 1;
        filter: drop-shadow(var(--shadow));
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: 50%;
      }

      .pointer {
        position: absolute;
        top: -10px;
        left: 50%;
        z-index: 2;
        width: 0;
        height: 0;
        transform: translateX(-50%);
        border-left: 20px solid transparent;
        border-right: 20px solid transparent;
        border-top: 0;
        border-bottom: 42px solid var(--accent);
        filter: drop-shadow(0 8px 14px rgba(0, 0, 0, 0.42));
      }

      .center-button {
        position: absolute;
        inset: 50% auto auto 50%;
        width: clamp(118px, 18vw, 172px);
        aspect-ratio: 1;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        display: grid;
        place-items: center;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.94), rgba(226, 232, 237, 0.92)),
          var(--text);
        color: #111216;
        box-shadow:
          inset 0 0 0 8px rgba(17, 18, 22, 0.08),
          0 18px 45px rgba(0, 0, 0, 0.38);
        cursor: pointer;
        transition:
          transform 180ms ease,
          box-shadow 180ms ease,
          opacity 180ms ease;
      }

      .center-button:hover {
        transform: translate(-50%, -50%) scale(1.035);
      }

      .center-button:active {
        transform: translate(-50%, -50%) scale(0.98);
      }

      .center-button[disabled] {
        cursor: wait;
        opacity: 0.78;
      }

      .center-button strong {
        display: block;
        font-size: clamp(1.35rem, 2.7vw, 2rem);
        line-height: 1;
        letter-spacing: 0;
      }

      .center-button span {
        display: block;
        margin-top: 8px;
        font-size: 0.82rem;
        color: rgba(17, 18, 22, 0.62);
      }

      .actions {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        min-height: 42px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 0 15px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        border: 1px solid var(--line);
        cursor: pointer;
        text-decoration: none;
        transition:
          background 160ms ease,
          border-color 160ms ease,
          transform 160ms ease;
      }

      .btn:hover {
        background: rgba(255, 255, 255, 0.13);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .btn:active {
        transform: translateY(1px);
      }

      .btn.primary {
        background: var(--accent);
        border-color: transparent;
        color: #15120b;
        font-weight: 800;
      }

      .btn.primary:hover {
        background: #ffda7e;
      }

      .btn[disabled] {
        opacity: 0.48;
        cursor: not-allowed;
      }

      .icon {
        width: 17px;
        height: 17px;
        display: block;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.1;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex: 0 0 auto;
      }

      .sidebar {
        min-width: 0;
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr) auto;
        gap: 14px;
      }

      .panel {
        background: rgba(24, 27, 31, 0.84);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 22px 58px rgba(0, 0, 0, 0.25);
        backdrop-filter: blur(18px);
      }

      .finder-panel {
        padding: 14px;
        display: grid;
        gap: 12px;
      }

      .search-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
      }

      .input,
      .select {
        width: 100%;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.07);
        color: var(--text);
        outline: none;
      }

      .input {
        padding: 0 12px;
      }

      .select {
        padding: 0 34px 0 10px;
        appearance: none;
        background-image:
          linear-gradient(45deg, transparent 50%, var(--muted) 50%),
          linear-gradient(135deg, var(--muted) 50%, transparent 50%);
        background-position:
          calc(100% - 18px) 18px,
          calc(100% - 12px) 18px;
        background-size:
          6px 6px,
          6px 6px;
        background-repeat: no-repeat;
      }

      .input:focus,
      .select:focus {
        border-color: rgba(255, 207, 95, 0.72);
        box-shadow: 0 0 0 3px rgba(255, 207, 95, 0.12);
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .field {
        display: grid;
        gap: 6px;
      }

      .field label {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 760;
      }

      .source-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .source-status {
        margin: 0;
        color: var(--muted);
        font-size: 0.84rem;
        line-height: 1.38;
      }

      .source-status strong {
        color: var(--text);
      }

      .result-panel {
        padding: 18px;
        min-height: 194px;
        display: grid;
        align-content: center;
        gap: 12px;
      }

      .eyebrow {
        margin: 0;
        color: var(--accent-2);
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 800;
      }

      .result-name {
        margin: 0;
        font-size: clamp(1.65rem, 4vw, 2.3rem);
        line-height: 1;
        letter-spacing: 0;
        overflow-wrap: anywhere;
      }

      .result-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #e8edf0;
        font-size: 0.84rem;
      }

      .pill.hot {
        background: rgba(255, 207, 95, 0.16);
        border-color: rgba(255, 207, 95, 0.24);
        color: #ffe7a4;
      }

      .result-note,
      .result-address {
        margin: 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .result-address {
        color: #d8dde1;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 14px 10px;
      }

      .panel-head h2 {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 0;
      }

      .tiny {
        color: var(--muted);
        font-size: 0.82rem;
        white-space: nowrap;
      }

      .restaurant-list {
        max-height: min(44vh, 520px);
        overflow: auto;
        padding: 0 10px 10px;
        scrollbar-color: rgba(255, 255, 255, 0.28) transparent;
      }

      .restaurant {
        display: grid;
        grid-template-columns: 32px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid transparent;
      }

      .restaurant + .restaurant {
        margin-top: 3px;
      }

      .restaurant.is-picked {
        border-color: rgba(255, 207, 95, 0.52);
        background: rgba(255, 207, 95, 0.08);
      }

      .dot {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: #111216;
        font-size: 0.78rem;
        font-weight: 900;
      }

      .restaurant-main {
        min-width: 0;
      }

      .restaurant-title {
        margin: 0;
        color: var(--text);
        font-weight: 760;
        line-height: 1.15;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .restaurant-sub {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.82rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .mini-btn {
        width: 34px;
        height: 34px;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--muted);
        cursor: pointer;
      }

      .mini-btn:hover {
        color: var(--text);
        background: rgba(255, 255, 255, 0.1);
      }

      .history-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 0 14px 14px;
      }

      .empty {
        padding: 0 14px 14px;
        margin: 0;
        color: var(--muted);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 20px;
        z-index: 5;
        transform: translate(-50%, calc(100% + 28px));
        min-width: min(420px, calc(100vw - 28px));
        max-width: calc(100vw - 28px);
        padding: 12px 14px;
        border-radius: 8px;
        background: rgba(246, 243, 238, 0.96);
        color: #111216;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
        font-weight: 700;
        text-align: center;
        opacity: 0;
        pointer-events: none;
        visibility: hidden;
        transition:
          transform 220ms ease,
          opacity 220ms ease,
          visibility 220ms ease;
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
        visibility: visible;
      }

      .intro-overlay {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 30%, rgba(255, 207, 95, 0.14), transparent 20rem),
          rgba(10, 11, 13, 0.92);
        opacity: 1;
        transition:
          opacity 260ms ease,
          visibility 260ms ease;
      }

      .intro-overlay[hidden] {
        display: none;
      }

      .intro-overlay.is-closing {
        opacity: 0;
        visibility: hidden;
      }

      .intro-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border-radius: 0;
      }

      .intro-copy {
        position: relative;
        z-index: 1;
        display: grid;
        justify-items: center;
        gap: 14px;
        width: min(92vw, 640px);
        padding: 26px 18px;
        text-align: center;
      }

      .intro-kicker {
        margin: 0;
        color: var(--accent-2);
        font-size: 0.82rem;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .intro-title {
        margin: 0;
        color: var(--text);
        font-size: clamp(2.35rem, 8vw, 5.6rem);
        line-height: 0.95;
        letter-spacing: 0;
        text-shadow: 0 16px 40px rgba(0, 0, 0, 0.42);
        animation: introPop 760ms cubic-bezier(0.2, 0.9, 0.2, 1) both;
      }

      .intro-subtitle {
        margin: 0;
        color: rgba(246, 243, 238, 0.78);
        font-size: clamp(1rem, 2.8vw, 1.35rem);
        line-height: 1.4;
      }

      .intro-skip {
        margin-top: 4px;
        min-height: 42px;
        padding: 0 18px;
        border-radius: 8px;
        background: rgba(255, 207, 95, 0.96);
        color: #15120b;
        font-weight: 900;
        cursor: pointer;
      }

      @keyframes introPop {
        0% {
          opacity: 0;
          transform: translateY(16px) scale(0.96);
        }

        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @media (max-width: 980px) {
        .app {
          grid-template-columns: 1fr;
        }

        .stage {
          min-height: auto;
        }

        .wheel-zone {
          min-height: auto;
          padding: 10px 0 6px;
        }

        .wheel-shell {
          width: min(86vw, 620px);
        }

        .sidebar {
          grid-template-rows: auto auto auto auto;
        }

        .restaurant-list {
          max-height: none;
        }
      }

      @media (max-width: 620px) {
        .app {
          padding: 14px;
          gap: 18px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .counter {
          min-width: auto;
          height: 36px;
        }

        .wheel-shell {
          width: min(92vw, 520px);
        }

        .pointer {
          border-left-width: 15px;
          border-right-width: 15px;
          border-bottom-width: 34px;
        }

        .center-button {
          width: 116px;
        }

        .actions,
        .search-row,
        .field-grid {
          grid-template-columns: 1fr;
        }

        .actions {
          justify-content: stretch;
        }

        .btn {
          flex: 1 1 142px;
        }

        .restaurant {
          grid-template-columns: 30px minmax(0, 1fr) 32px;
          padding: 9px 8px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
          animation-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="stage" aria-label="转盘">
        <div class="topbar">
          <div class="brand">
            <h1>嫣然吃什么</h1>
            <label class="quick-cuisine" id="locationLabel" for="topCuisineSelect">
              <span>选择口味</span>
              <select class="quick-cuisine-select" id="topCuisineSelect">
                <option value="all">都可以</option>
                <option value="asian" selected>亚洲口味</option>
                <option value="thai">泰餐</option>
                <option value="japanese">日餐</option>
                <option value="chinese">中餐</option>
                <option value="korean">韩餐</option>
                <option value="indian">印度菜</option>
                <option value="american">美国口味</option>
                <option value="western">西餐</option>
              </select>
            </label>
          </div>
          <div class="counter" id="activeCount">20 家</div>
        </div>

        <div class="wheel-zone">
          <div class="wheel-shell">
            <div class="pointer" aria-hidden="true"></div>
            <canvas id="wheel" width="900" height="900" aria-label="餐厅转盘"></canvas>
            <button class="center-button" id="spinCenter" type="button">
              <span>
                <strong>开转</strong>
                <span id="centerHint">20 选 1</span>
              </span>
            </button>
          </div>
        </div>

        <div class="actions">
          <button class="btn primary" id="spinButton" type="button">
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M21 12a9 9 0 1 1-2.64-6.36" />
              <path d="M21 3v6h-6" />
            </svg>
            开转
          </button>
          <button class="btn" id="skipButton" type="button">
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
            <span id="skipLabel">先随机一家</span>
          </button>
          <button class="btn" id="restoreButton" type="button">
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M3 12a9 9 0 1 0 3-6.7" />
              <path d="M3 3v6h6" />
            </svg>
            恢复候选
          </button>
        </div>
      </section>

      <aside class="sidebar">
        <section class="panel finder-panel">
          <form class="search-row" id="locationForm">
            <input class="input" id="addressInput" type="search" autocomplete="street-address" placeholder="输入地址、地标或街区" />
            <button class="btn primary" id="searchButton" type="submit">
              <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.3-4.3" />
              </svg>
              查附近
            </button>
          </form>

          <button class="btn" id="locateButton" type="button">
            <svg class="icon" aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 2v3" />
              <path d="M12 19v3" />
              <path d="M2 12h3" />
              <path d="M19 12h3" />
              <circle cx="12" cy="12" r="7" />
              <circle cx="12" cy="12" r="2" />
            </svg>
            使用当前位置
          </button>

          <div class="field-grid">
            <div class="field">
              <label for="radiusSelect">距离</label>
              <select class="select" id="radiusSelect">
                <option value="800">近一点</option>
                <option value="1600" selected>附近</option>
                <option value="3200">值得走</option>
              </select>
            </div>
            <div class="field">
              <label for="cuisineSelect">口味</label>
              <select class="select" id="cuisineSelect">
                <option value="all">都可以</option>
                <option value="asian" selected>亚洲口味</option>
                <option value="thai">泰餐</option>
                <option value="japanese">日餐</option>
                <option value="chinese">中餐</option>
                <option value="korean">韩餐</option>
                <option value="indian">印度菜</option>
                <option value="american">美国口味</option>
                <option value="western">西餐</option>
              </select>
            </div>
            <div class="field">
              <label for="occasionSelect">场景</label>
              <select class="select" id="occasionSelect">
                <option value="all">都行</option>
                <option value="daily">日常</option>
                <option value="lunch">午餐</option>
                <option value="dinner">晚餐</option>
                <option value="quick">快速随便</option>
                <option value="big">值得吃大餐</option>
              </select>
            </div>
          </div>

          <div class="source-row">
            <p class="source-status" id="sourceStatus">默认使用 LIC 精选和公开地图数据。</p>

        </section>

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const size = Math.max(320, Math.floor(rect.width));
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        canvas.width = size * dpr;
        canvas.height = size * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        drawWheel();
      }

      function drawWheel() {
        const size = canvas.width / Math.min(window.devicePixelRatio || 1, 2);
        const center = size / 2;
        const radius = center - 10;
        const active = state.active;
        const count = active.length;
        ctx.clearRect(0, 0, size, size);

        ctx.save();
        ctx.translate(center, center);

        if (!count) {
          drawEmptyWheel(radius);
          ctx.restore();
          return;
        }

        const seg = TAU / count;
        active.forEach((restaurantIndex, slot) => {
          const start = rotation + slot * seg - Math.PI / 2;
          const end = start + seg;
          const isPicked = restaurantIndex === currentPick;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.arc(0, 0, radius, start, end);
          ctx.closePath();
          ctx.fillStyle = colors[restaurantIndex % colors.length];
          ctx.fill();

          ctx.lineWidth = isPicked ? 5 : 2;
          ctx.strokeStyle = isPicked ? "rgba(255,255,255,0.95)" : "rgba(17,18,22,0.24)";
          ctx.stroke();

          drawSliceLabel(restaurants[restaurantIndex], restaurantIndex, start + seg / 2, radius, count);
        });

        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, TAU);
        ctx.lineWidth = 9;
        ctx.strokeStyle = "rgba(255,255,255,0.92)";
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(0, 0, radius - 18, 0, TAU);
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = "rgba(17,18,22,0.22)";
        ctx.stroke();

        ctx.restore();
      }

      function drawEmptyWheel(radius) {
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, TAU);
        ctx.fillStyle = "#24282f";
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.28)";
        ctx.lineWidth = 8;
        ctx.stroke();
      }

      function drawSliceLabel(restaurant, restaurantIndex, angle, radius, count) {
        if (!restaurant) return;
        if (radius < 230) {
          drawCompactSliceLabel(restaurantIndex, angle, radius);
          return;
        }

        const textRadius = count > 14 ? radius * 0.68 : radius * 0.64;
        const text = `${restaurantIndex + 1}. ${restaurant.name}`;
        const max = count > 14 ? 15 : 20;
        const label = text.length > max ? `${text.slice(0, max - 1)}…` : text;
        const x = Math.cos(angle) * textRadius;
        const y = Math.sin(angle) * textRadius;
        const baseColor = colors[restaurantIndex % colors.length];
        const darkText = shouldUseDarkText(baseColor);

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle + Math.PI / 2);
        if (Math.sin(angle) > 0) {
          ctx.rotate(Math.PI);
        }
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = darkText ? "rgba(17,18,22,0.92)" : "rgba(255,255,255,0.96)";
        ctx.font = `800 ${count > 16 ? 12 : 14}px Inter, system-ui, sans-serif`;
        ctx.fillText(label, 0, 0);
        ctx.font = `650 ${count > 16 ? 10 : 11}px Inter, system-ui, sans-serif`;
        ctx.globalAlpha = 0.84;
        ctx.fillText(restaurant.cuisine, 0, 15);
        ctx.restore();
      }

      function drawCompactSliceLabel(restaurantIndex, angle, radius) {
        const textRadius = radius * 0.76;
        const x = Math.cos(angle) * textRadius;
        const y = Math.sin(angle) * textRadius;
        const number = String(restaurantIndex + 1);
        ctx.save();
        ctx.translate(x, y);
        ctx.beginPath();
        ctx.arc(0, 0, 11, 0, TAU);
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.fill();
        ctx.fillStyle = "#111216";
        ctx.font = "850 10px Inter, system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(number, 0, 0.4);
        ctx.restore();
      }

      function shouldUseDarkText(hex) {
        const value = hex.replace("#", "");
        const r = parseInt(value.slice(0, 2), 16);
        const g = parseInt(value.slice(2, 4), 16);
        const b = parseInt(value.slice(4, 6), 16);
        return (r * 299 + g * 587 + b * 114) / 1000 > 150;
      }

      function applyFilters({ resetActive = true } = {}) {
        const location = state.location || DEFAULT_LOCATION;
        const radius = state.filters.radius;
        const cuisine = state.filters.cuisine;
        const occasion = state.filters.occasion;
        const scored = allRestaurants
          .map((restaurant) => enrichRestaurant(restaurant, location, cuisine, occasion))
          .filter((restaurant) => Number.isFinite(restaurant.distanceMeters))
          .filter((restaurant) => restaurant.distanceMeters <= radius)
          .filter((restaurant) => cuisineMatches(restaurant, cuisine))
          .filter((restaurant) => occasionMatches(restaurant, occasion))
          .sort((a, b) => b.score - a.score || a.distanceMeters - b.distanceMeters);

        restaurants = scored.slice(0, MAX_WHEEL_ITEMS);
        if (resetActive) {
          state.active = restaurants.map((_, index) => index);
          currentPick = null;
          rotation = 0;
        } else {
          state.active = state.active.filter((index) => restaurants[index]);
        }
        updateLocationText();
        renderAll();
      }

      function enrichRestaurant(restaurant, location, cuisineFilter, occasionFilter) {
        const distance = restaurant.lat && restaurant.lon ? distanceMeters(location, restaurant) : Infinity;
        const distanceScore = Number.isFinite(distance) ? Math.max(0, 34 - distance / 85) : 0;
        const sourceScore = restaurant.sources?.includes("Michelin")
          ? 12
          : restaurant.sources?.includes("The Infatuation")
            ? 9
            : restaurant.sourceType === "curated"
              ? 7
              : 0;
        const cuisineScore = cuisineFilter !== "all" && cuisineMatches(restaurant, cuisineFilter) ? 12 : 0;
        const occasionScore = occasionFilter !== "all" && occasionMatches(restaurant, occasionFilter) ? 9 : 0;
        const dataScore = restaurant.website ? 2 : 0;
        return {
          ...restaurant,
          distanceMeters: Math.round(distance),
          score: Math.round((restaurant.rank || 62) + distanceScore + sourceScore + cuisineScore + occasionScore + dataScore)
        };
      }

      function cuisineMatches(restaurant, filter) {
        if (filter === "all") return true;
        if (filter === "asian") return ASIAN_GROUPS.includes(restaurant.group);
        if (filter === "western") return ["american", "italian", "french", "steakhouse", "western"].includes(restaurant.group);
        return restaurant.group === filter;
      }

      function occasionMatches(restaurant, filter) {
        if (filter === "all") return true;
        return restaurant.occasions?.includes(filter);
      }

      function renderAll() {
        renderCounts();
        renderRestaurants();
        renderHistory();
        drawWheel();
      }

      function renderCounts() {
        const canSkipCurrent = currentPick !== null && state.active.includes(currentPick);
        const total = restaurants.length;
        activeCount.textContent = `${state.active.length} 家`;
        centerHint.textContent = total ? `${state.active.length} 选 1` : "无候选";
        listCount.textContent = `${state.active.length} / ${total}`;
        spinButton.disabled = spinning || state.active.length === 0;
        spinCenter.disabled = spinning || state.active.length === 0;
        skipButton.disabled = spinning || state.active.length < 2;
        skipLabel.textContent = canSkipCurrent ? "这家先跳过" : "先随机一家";
      }

      function renderRestaurants() {
        restaurantList.innerHTML = "";
        if (!restaurants.length) {
          const empty = document.createElement("p");
          empty.className = "empty";
          empty.textContent = "这组筛选暂时没有候选，换个距离或口味。";
          restaurantList.appendChild(empty);
          return;
        }

        restaurants.forEach((restaurant, index) => {
          const active = state.active.includes(index);
          const item = document.createElement("article");
          item.className = `restaurant${index === currentPick ? " is-picked" : ""}`;
          item.style.opacity = active ? "1" : "0.42";

          const dot = document.createElement("div");
          dot.className = "dot";
          dot.style.background = colors[index % colors.length];
          dot.textContent = index + 1;

          const main = document.createElement("div");
          main.className = "restaurant-main";
          main.innerHTML = `
            <p class="restaurant-title"></p>
            <p class="restaurant-sub"></p>
          `;
          main.querySelector(".restaurant-title").textContent = restaurant.name;
          main.querySelector(".restaurant-sub").textContent = `${restaurant.cuisine} · ${formatDistance(restaurant.distanceMeters)} · ${restaurant.address || "附近"}`;

          const toggle = document.createElement("button");
          toggle.className = "mini-btn";
          toggle.type = "button";
          toggle.title = active ? "移出转盘" : "加入转盘";
          toggle.setAttribute("aria-label", active ? `移出 ${restaurant.name}` : `加入 ${restaurant.name}`);
          toggle.innerHTML = active
            ? `<svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>`
            : `<svg class="icon" aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></svg>`;
          toggle.addEventListener("click", () => toggleRestaurant(index));

          item.append(dot, main, toggle);
          restaurantList.appendChild(item);
        });
      }

      function renderHistory() {
        historyList.innerHTML = "";
        historyEmpty.hidden = state.history.length > 0;
        state.history.slice(0, 8).forEach((item) => {
          const pill = document.createElement("span");
          pill.className = "pill";
          pill.textContent = item.name || item;
          historyList.appendChild(pill);
        });
      }

      function setResult(index) {
        const restaurant = restaurants[index];
        if (!restaurant) return;
        currentPick = index;
        resultEyebrow.textContent = "转盘选中";
        resultName.textContent = restaurant.name;
        resultMeta.innerHTML = "";
        [
          restaurant.cuisine,
          formatDistance(restaurant.distanceMeters),
          ...sourcePills(restaurant)
        ].forEach((text, pillIndex) => {
          const pill = document.createElement("span");
          pill.className = pillIndex > 1 ? "pill hot" : "pill";
          pill.textContent = text;
          resultMeta.appendChild(pill);
        });
        resultAddress.textContent = restaurant.address || state.location.label || "附近";
        resultNote.textContent = restaurant.note || `${restaurant.cuisine} · 综合推荐 ${restaurant.score}`;
        mapLink.href = mapsUrl(restaurant);
        state.history = [{ name: restaurant.name }, ...state.history.filter((item) => item.name !== restaurant.name)].slice(0, 12);
        saveState();
        renderAll();
      }

      function sourcePills(restaurant) {
        if (restaurant.sources?.length) return restaurant.sources.slice(0, 2);
        if (restaurant.sourceType === "map") return ["公开地图"];
        return [`推荐 ${restaurant.score}`];
      }

      function randomSlot() {
        const array = new Uint32Array(1);
        crypto.getRandomValues(array);
        return array[0] % state.active.length;
      }

      function spin() {
        if (spinning || state.active.length === 0) return;
        const selectedSlot = randomSlot();
        const selectedIndex = state.active[selectedSlot];
        const seg = TAU / state.active.length;
        const startRotation = rotation;
        const targetBase = -(selectedSlot + 0.5) * seg;
        let endRotation = targetBase;
        const minimum = startRotation + TAU * (5 + Math.floor(Math.random() * 3));
        while (endRotation < minimum) {
          endRotation += TAU;
        }

        const duration = 3400 + Math.random() * 800;
        const start = performance.now();
        spinning = true;
        currentPick = null;
        spinButton.disabled = true;
        spinCenter.disabled = true;
        skipButton.disabled = true;
        resultEyebrow.textContent = "转盘旋转中";
        resultName.textContent = "等等看";
        resultNote.textContent = "命运正在和晚饭商量。";
        drawWheel();

        function animate(now) {
          const raw = Math.min(1, (now - start) / duration);
          const eased = 1 - Math.pow(1 - raw, 4);
          rotation = startRotation + (endRotation - startRotation) * eased;
          drawWheel();
          if (raw < 1) {
            requestAnimationFrame(animate);
          } else {
            rotation = normalize(endRotation);
            spinning = false;
            spinButton.disabled = false;
            spinCenter.disabled = false;
            setResult(selectedIndex);
            showToast(`今天吃：${restaurants[selectedIndex].name}`);
          }
        }

        requestAnimationFrame(animate);
      }

      function normalize(value) {
        return ((value % TAU) + TAU) % TAU;
      }

      function toggleRestaurant(index) {
        if (spinning) return;
        if (state.active.includes(index)) {
          if (state.active.length === 1) {
            showToast("至少留一家。");
            return;
          }
          state.active = state.active.filter((item) => item !== index);
          if (currentPick === index) currentPick = null;
        } else {
          state.active = [...state.active, index].sort((a, b) => a - b);
        }
        renderAll();
      }

      function skipCurrent() {
        if (spinning || state.active.length < 2) return;
        if (currentPick === null || !state.active.includes(currentPick)) {
          spin();
          return;
        }
        const skipped = currentPick;
        state.active = state.active.filter((item) => item !== skipped);
        currentPick = null;
        renderAll();
        showToast(`${restaurants[skipped].name} 先跳过，重新抽。`);
        spin();
      }

      function restoreAll() {
        state.active = restaurants.map((_, index) => index);
        currentPick = null;
        renderAll();
        showToast("候选已恢复。");
      }

      async function searchAddress(event) {
        event?.preventDefault();
        const query = addressInput.value.trim();
        if (!query) {
          showToast("先输入地址或地标。");
          return;
        }
        setLoading(true, "正在查这个地址附近");
        try {
          const location = await geocodeAddress(query);
          await setLocation(location, "地址");
        } catch (error) {
          showToast(error.message || "地址没查到。");
          setLoading(false);
        }
      }

      async function useCurrentLocation() {
        if (!navigator.geolocation) {
          showToast("这个浏览器不支持定位。");
          return;
        }
        setLoading(true, "正在获取定位");
        navigator.geolocation.getCurrentPosition(
          async (position) => {
            const location = {
              label: "当前位置",
              lat: position.coords.latitude,
              lon: position.coords.longitude
            };
            await setLocation(location, "定位");
          },
          () => {
            setLoading(false);
            sourceStatus.textContent = "定位没有打开，可以直接输入地址。";
            showToast("没有拿到定位，手输地址也可以。");
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 }
        );
      }

      async function setLocation(location, sourceName) {
        state.location = location;
        addressInput.value = location.label;
        saveState();
        setLoading(true, `正在更新 ${location.label}`);
        try {
          const nearby = await fetchNearbyRestaurants(location, state.filters.radius);
          mergeNearbyRestaurants(nearby);
          applyFilters();
          sourceStatus.innerHTML = `<strong>${sourceName}</strong> · ${restaurants.length} 家候选`;
          showToast(`已更新到 ${location.label}`);
        } catch (error) {
          applyFilters();
          sourceStatus.innerHTML = `<strong>${sourceName}</strong> · 公开地图暂时没返回，先用精选名单`;
        } finally {
          setLoading(false);
        }
      }

      async function geocodeAddress(query) {
        const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&accept-language=zh-CN,en&q=${encodeURIComponent(query)}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error("地址服务暂时不可用。");
        const data = await response.json();
        if (!data.length) throw new Error("没找到这个地址。");
        return {
          label: simplifyAddress(data[0].display_name || query),
          lat: Number(data[0].lat),
          lon: Number(data[0].lon)
        };
      }

      async function fetchNearbyRestaurants(location, radius) {
        if (window.location.protocol === "file:") return [];

        const query = `
          [out:json][timeout:25];
          (
            node["amenity"~"restaurant|fast_food|cafe"](around:${Math.max(radius, 1200)},${location.lat},${location.lon});
            way["amenity"~"restaurant|fast_food|cafe"](around:${Math.max(radius, 1200)},${location.lat},${location.lon});
            relation["amenity"~"restaurant|fast_food|cafe"](around:${Math.max(radius, 1200)},${location.lat},${location.lon});
          );
          out center tags 80;
        `;
        const response = await fetch("https://overpass-api.de/api/interpreter", {
          method: "POST",
          body: query
        });
        if (!response.ok) throw new Error("公开地图查询失败。");
        const data = await response.json();
        return data.elements
          .map((element) => osmElementToRestaurant(element))
          .filter(Boolean)
          .slice(0, 80);
      }

      function osmElementToRestaurant(element) {
        const tags = element.tags || {};
        const name = tags.name || tags["name:en"] || tags["name:zh"];
        if (!name) return null;
        const lat = element.lat ?? element.center?.lat;
        const lon = element.lon ?? element.center?.lon;
        if (!lat || !lon) return null;
        const group = groupFromCuisine(tags.cuisine, tags.amenity, name);
        const cuisine = labelFromGroup(group, tags.cuisine);
        const address = [
          tags["addr:housenumber"],
          tags["addr:street"],
          tags["addr:city"]
        ]
          .filter(Boolean)
          .join(" ");
        return {
          id: `osm-${element.type}-${element.id}`,
          sourceType: "map",
          name,
          cuisine,
          group,
          address: address || "附近",
          lat: Number(lat),
          lon: Number(lon),
          occasions: occasionsFromTags(tags, group),
          sources: ["公开地图"],
          rank: tags.amenity === "restaurant" ? 70 : 62,
          website: tags.website || tags["contact:website"],
          note: `${cuisine} · ${tags.amenity === "fast_food" ? "适合快速吃" : "附近可选"}`
        };
      }

      function mergeNearbyRestaurants(nearby) {
        const curatedKeys = new Set(curatedRestaurants.map((restaurant) => normalizeName(restaurant.name)));
        const uniqueNearby = nearby.filter((restaurant) => !curatedKeys.has(normalizeName(restaurant.name)));
        allRestaurants = [...curatedRestaurants, ...uniqueNearby];
      }

      function groupFromCuisine(cuisine = "", amenity = "", name = "") {
        const text = `${cuisine} ${name}`.toLowerCase();
        if (/(thai|泰)/.test(text)) return "thai";
        if (/(japanese|sushi|ramen|izakaya|yakitori|udon|日|寿司|拉面)/.test(text)) return "japanese";
        if (/(chinese|szechuan|sichuan|cantonese|dim_sum|noodle|dumpling|中|川|粤|面|饺)/.test(text)) return "chinese";
        if (/(korean|bbq|banchan|韩)/.test(text)) return "korean";
        if (/(indian|curry|印度)/.test(text)) return "indian";
        if (/(taiwanese|bubble_tea|台)/.test(text)) return "taiwanese";
        if (/(vietnamese|pho|越南)/.test(text)) return "vietnamese";
        if (/(american|burger|diner|sandwich|steak)/.test(text)) return "american";
        if (/(italian|pizza|pasta)/.test(text)) return "italian";
        if (/(mexican|taco|burrito)/.test(text)) return "mexican";
        if (/(french)/.test(text)) return "french";
        if (amenity === "cafe" || /(coffee|cafe|bakery)/.test(text)) return "cafe";
        return "other";
      }

      function labelFromGroup(group, rawCuisine = "") {
        if (group !== "other") return cuisineLabels[group] || "餐厅";
        if (!rawCuisine) return "餐厅";
        return rawCuisine
          .split(";")[0]
          .replace(/_/g, " ")
          .replace(/\b\w/g, (letter) => letter.toUpperCase());
      }

      function occasionsFromTags(tags, group) {
        const occasions = new Set(["daily"]);
        if (tags.amenity === "fast_food") occasions.add("quick");
        if (["cafe", "american", "chinese", "japanese", "thai", "indian"].includes(group)) occasions.add("lunch");
        if (!["cafe"].includes(group)) occasions.add("dinner");
        if (["thai", "japanese", "chinese", "korean", "italian", "mexican"].includes(group)) occasions.add("big");
        return [...occasions];
      }

      function onFilterChange(event) {
        const cuisineValue = event?.target === topCuisineSelect ? topCuisineSelect.value : cuisineSelect.value;
        cuisineSelect.value = cuisineValue;
        topCuisineSelect.value = cuisineValue;
        state.filters = {
          radius: Number(radiusSelect.value),
          cuisine: cuisineValue,
          occasion: occasionSelect.value
        };
        saveState();
        applyFilters();
        if (!loadingNearby) {
          sourceStatus.innerHTML = `<strong>${cuisineLabels[state.filters.cuisine] || "全部"}</strong> · ${restaurants.length} 家候选`;
        }
      }

      function updateLocationText() {
        cuisineSelect.value = state.filters.cuisine;
        topCuisineSelect.value = state.filters.cuisine;
      }

      function setLoading(isLoading, message = "") {
        loadingNearby = isLoading;
        locateButton.disabled = isLoading;
        searchButton.disabled = isLoading;
        radiusSelect.disabled = isLoading;
        cuisineSelect.disabled = isLoading;
        topCuisineSelect.disabled = isLoading;
        occasionSelect.disabled = isLoading;
        if (message) sourceStatus.textContent = message;
      }

      function distanceMeters(a, b) {
        const radius = 6371000;
        const phi1 = toRadians(a.lat);
        const phi2 = toRadians(b.lat);
        const deltaPhi = toRadians(b.lat - a.lat);
        const deltaLambda = toRadians(b.lon - a.lon);
        const h =
          Math.sin(deltaPhi / 2) ** 2 +
          Math.cos(phi1) * Math.cos(phi2) * Math.sin(deltaLambda / 2) ** 2;
        return radius * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1 - h));
      }

      function toRadians(value) {
        return (Number(value) * Math.PI) / 180;
      }

      function formatDistance(meters) {
        if (!Number.isFinite(meters)) return "附近";
        if (meters < 1000) return `${Math.max(1, Math.round(meters / 10) * 10)}m`;
        return `${(meters / 1000).toFixed(1)}km`;
      }

      function mapsUrl(restaurant) {
        const query = restaurant.lat && restaurant.lon
          ? `${restaurant.name} ${restaurant.lat},${restaurant.lon}`
          : `${restaurant.name} ${restaurant.address || ""} ${state.location?.label || ""}`;
        return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
      }

      function simplifyAddress(address) {
        return address.split(",").slice(0, 3).join(",").trim();
      }

      function normalizeName(name) {
        return name.toLowerCase().replace(/[^a-z0-9\u4e00-\u9fff]/g, "");
      }

      function showToast(message) {
        clearTimeout(toastTimer);
        toast.textContent = message;
        toast.classList.add("show");
        toastTimer = setTimeout(() => toast.classList.remove("show"), 1900);
      }

      function startIntro() {
        if (!introOverlay || !introCanvas) return;
        const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        introOverlay.hidden = false;
        introOverlay.classList.remove("is-closing");
        introSkip.focus({ preventScroll: true });

        if (reducedMotion) {
          introCloseTimer = window.setTimeout(closeIntro, 2400);
          return;
        }

        const introCtx = introCanvas.getContext("2d");
        const particles = [];
        const palette = ["#ffcf5f", "#61d3b2", "#ff6b6b", "#72ddf7", "#f15bb5", "#f9844a"];
        let lastBurst = 0;
        let burstCount = 0;
        let startedAt = performance.now();

        function resizeIntro() {
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          introCanvas.width = Math.floor(window.innerWidth * dpr);
          introCanvas.height = Math.floor(window.innerHeight * dpr);
          introCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        }

        function burst() {
          const x = window.innerWidth * (0.18 + Math.random() * 0.64);
          const y = window.innerHeight * (0.16 + Math.random() * 0.42);
          const color = palette[burstCount % palette.length];
          const pieces = 34 + Math.floor(Math.random() * 20);
          for (let i = 0; i < pieces; i += 1) {
            const angle = (Math.PI * 2 * i) / pieces + Math.random() * 0.16;
            const speed = 1.5 + Math.random() * 4.6;
            particles.push({
              x,
              y,
              vx: Math.cos(angle) * speed,
              vy: Math.sin(angle) * speed,
              life: 60 + Math.random() * 34,
              age: 0,
              size: 1.8 + Math.random() * 2.8,
              color
            });
          }
          burstCount += 1;
        }

        function animate(now) {
          const elapsed = now - startedAt;
          introCtx.globalCompositeOperation = "source-over";
          introCtx.fillStyle = "rgba(10, 11, 13, 0.18)";
          introCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);

          if (elapsed < 2600 && now - lastBurst > 360) {
            burst();
            lastBurst = now;
          }

          introCtx.globalCompositeOperation = "lighter";
          for (let i = particles.length - 1; i >= 0; i -= 1) {
            const particle = particles[i];
            particle.age += 1;
            particle.vy += 0.045;
            particle.vx *= 0.988;
            particle.vy *= 0.988;
            particle.x += particle.vx;
            particle.y += particle.vy;

            const alpha = Math.max(0, 1 - particle.age / particle.life);
            introCtx.globalAlpha = alpha;
            introCtx.fillStyle = particle.color;
            introCtx.beginPath();
            introCtx.arc(particle.x, particle.y, particle.size * alpha, 0, TAU);
            introCtx.fill();

            if (particle.age >= particle.life) particles.splice(i, 1);
          }
          introCtx.globalAlpha = 1;

          if (!introOverlay.hidden && !introOverlay.classList.contains("is-closing")) {
            introAnimation = requestAnimationFrame(animate);
          }
        }

        resizeIntro();
        window.addEventListener("resize", resizeIntro, { passive: true });
        burst();
        introAnimation = requestAnimationFrame(animate);
        introCloseTimer = window.setTimeout(closeIntro, 4200);
      }

      function closeIntro(event) {
        if (!introOverlay || introOverlay.hidden) return;
        clearTimeout(introCloseTimer);
        if (introAnimation) cancelAnimationFrame(introAnimation);
        introOverlay.classList.add("is-closing");
        window.setTimeout(() => {
          introOverlay.hidden = true;
        }, 280);
      }

      async function autoLocateOnce() {
        const autoKey = "food-wheel-auto-location-v1";
        if (localStorage.getItem(autoKey) || location.protocol !== "https:" || !navigator.geolocation) return;
        localStorage.setItem(autoKey, "1");
        window.setTimeout(useCurrentLocation, 700);
      }

      spinButton.addEventListener("click", spin);
      spinCenter.addEventListener("click", spin);
      skipButton.addEventListener("click", skipCurrent);
      restoreButton.addEventListener("click", restoreAll);
      locateButton.addEventListener("click", useCurrentLocation);
      locationForm.addEventListener("submit", searchAddress);
      [radiusSelect, cuisineSelect, topCuisineSelect, occasionSelect].forEach((control) => {
        control.addEventListener("change", onFilterChange);
      });
      clearHistory.addEventListener("click", () => {
        state.history = [];
        saveState();
        renderHistory();
      });
      introSkip.addEventListener("click", closeIntro);
      introOverlay.addEventListener("click", closeIntro);

      window.addEventListener("resize", resizeCanvas);
      setInitialControls();
      applyFilters();
      resizeCanvas();
      startIntro();
      if (window.location.protocol === "file:") {
        sourceStatus.innerHTML = `<strong>本地预览</strong> · 线上链接支持自动查附近`;
      } else {
        fetchNearbyRestaurants(state.location, state.filters.radius)
          .then((nearby) => {
            mergeNearbyRestaurants(nearby);
            applyFilters();
            sourceStatus.innerHTML = `<strong>公开地图</strong> · ${restaurants.length} 家候选`;
          })
          .catch(() => {
            sourceStatus.innerHTML = `<strong>精选名单</strong> · ${restaurants.length} 家候选`;
          })
          .finally(autoLocateOnce);
      }
    </script>
  </body>
</html>
